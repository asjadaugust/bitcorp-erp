version: '3.9'

# Test Docker Compose - Mirrors NAS production setup for local testing
# Usage: docker-compose -f docker-compose.test.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: bitcorp-postgres-test
    environment:
      POSTGRES_USER: bitcorp
      POSTGRES_PASSWORD: SecurePassword123!Change
      POSTGRES_DB: bitcorp_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./deploy/01_init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
      - ./database/migrations:/migrations:ro
    ports:
      - "5433:5432"
    networks:
      - bitcorp-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcorp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bitcorp-redis-test
    volumes:
      - redis_test_data:/data
    ports:
      - "6380:6379"
    networks:
      - bitcorp-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.prod.Dockerfile
    image: bitcorp-backend-test:latest
    container_name: bitcorp-backend-test
    environment:
      NODE_ENV: production
      PORT: 3400
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: bitcorp
      POSTGRES_PASSWORD: SecurePassword123!Change
      POSTGRES_DB: bitcorp_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long-for-security
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:4200
      LOG_LEVEL: info
    ports:
      - "3401:3400"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bitcorp-test-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3400/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.prod.Dockerfile
      args:
        API_URL: http://localhost:3401
    image: bitcorp-frontend-test:latest
    container_name: bitcorp-frontend-test
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bitcorp-test-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bitcorp-test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1

volumes:
  postgres_test_data:
  redis_test_data:
