services:
  postgres:
    image: postgres:16-alpine
    container_name: bitcorp-postgres-dev
    environment:
      POSTGRES_DB: bitcorp_dev
      POSTGRES_USER: bitcorp
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "3440:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bitcorp -d bitcorp_dev" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bitcorp-redis-dev
    ports:
      - '3460:6379'
    volumes:
      - redis_dev_data:/data
    networks:
      - bitcorp-network
    command: redis-server --appendonly yes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    container_name: bitcorp-backend-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - '3400:3400'
      - '3429:9229' # Node.js debugging
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tty: true
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: development
    container_name: bitcorp-frontend-dev
    environment:
      API_URL: http://localhost:3400
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '1000'
      NG_CLI_ANALYTICS: "false"
    ports:
      - '3420:3420'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tty: true
    command: [ 'sh', '-c', 'npm install && npm start' ]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bitcorp-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bitcorp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '3450:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres

  e2e:
    build:
      context: .
      dockerfile: docker/e2e.Dockerfile
    container_name: bitcorp-e2e
    environment:
      - CI=true
      - FRONTEND_URL=http://frontend:3420
      - SKIP_WEBSERVER=true
    ipc: host
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - test

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_data:
  frontend_node_modules:
  frontend_angular_cache:


networks:
  bitcorp-network:
    driver: bridge
