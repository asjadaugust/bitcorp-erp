services:
  postgres:
    image: postgres:16-alpine
    container_name: bitcorp-postgres-dev
    environment:
      POSTGRES_DB: bitcorp_dev
      POSTGRES_USER: bitcorp
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "3440:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - bitcorp-network
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "fsync=off"
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcorp -d bitcorp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bitcorp-redis-dev
    ports:
      - "3460:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - bitcorp-network
    command: redis-server --appendonly yes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: bitcorp-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://bitcorp:dev_password_change_me@postgres:5432/bitcorp_dev
      DB_HOST: postgres
      DB_PORT: "5432"
      POSTGRES_DB: bitcorp_dev
      POSTGRES_USER: bitcorp
      POSTGRES_PASSWORD: dev_password_change_me
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      CORS_ORIGINS: http://localhost:3420,http://localhost:4200,http://127.0.0.1:3420,http://127.0.0.1:4200
      LOG_LEVEL: debug
      ENVIRONMENT: development
      PORT: "3410"
      PYTHONPATH: /app
    ports:
      - "3410:3410"
    volumes:
      - ./backend:/app
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 3410 --reload"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tty: true

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    container_name: bitcorp-frontend-dev
    environment:
      API_URL: http://backend:3410
      NODE_ENV: development
    ports:
      - "3420:3420"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_angular_cache:/app/.angular
    depends_on:
      - backend
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tty: true
    command: npm run start -- --poll 2000

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bitcorp-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bitcorp.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "3450:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres

  e2e:
    build:
      context: .
      dockerfile: docker/e2e.Dockerfile
    container_name: bitcorp-e2e
    environment:
      - CI=true
      - FRONTEND_URL=http://frontend:3420
      - SKIP_WEBSERVER=true
    ipc: host
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - bitcorp-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - test

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_data:
  frontend_node_modules:
  frontend_angular_cache:

networks:
  bitcorp-network:
    driver: bridge
