<div *ngIf="message" class="alert alert-{{ type }}" role="alert">
  <mat-icon class="alert-icon">{{ getIcon() }}</mat-icon>
  <span class="alert-message">{{ message }}</span>
  <button
    *ngIf="dismissible"
    (click)="dismiss()"
    class="alert-close"
    mat-icon-button
    aria-label="Cerrar alerta">
    <mat-icon>close</mat-icon>
  </button>
</div>
