<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" rx="8" fill="#0077CD"/>
  <!-- Filled hexagon with subtle darker shade -->
  <polygon points="20,9 29.5,14.5 29.5,25.5 20,31 10.5,25.5 10.5,14.5" fill="white" fill-opacity="0.15"/>
  <!-- Hexagon outline -->
  <polygon points="20,9 29.5,14.5 29.5,25.5 20,31 10.5,25.5 10.5,14.5" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Spokes from center to vertices -->
  <line x1="20" y1="20" x2="20" y2="9" stroke="white" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="29.5" y2="14.5" stroke="white" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="29.5" y2="25.5" stroke="white" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="20" y2="31" stroke="white" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="10.5" y2="25.5" stroke="white" stroke-width="1.2"/>
  <line x1="20" y1="20" x2="10.5" y2="14.5" stroke="white" stroke-width="1.2"/>
  <!-- Center hub -->
  <circle cx="20" cy="20" r="3" fill="white"/>
  <!-- 6 node circles at vertices -->
  <circle cx="20" cy="9" r="2" fill="white"/>
  <circle cx="29.5" cy="14.5" r="2" fill="white"/>
  <circle cx="29.5" cy="25.5" r="2" fill="white"/>
  <circle cx="20" cy="31" r="2" fill="white"/>
  <circle cx="10.5" cy="25.5" r="2" fill="white"/>
  <circle cx="10.5" cy="14.5" r="2" fill="white"/>
</svg>
