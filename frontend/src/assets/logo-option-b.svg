<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" rx="8" fill="#0077CD"/>
  <!-- Minimal hexagon outline only, no internal lines -->
  <polygon points="20,8 30.4,14 30.4,26 20,32 9.6,26 9.6,14" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <!-- 6 node circles at vertices -->
  <circle cx="20" cy="8" r="2.5" fill="white"/>
  <circle cx="30.4" cy="14" r="2.5" fill="white"/>
  <circle cx="30.4" cy="26" r="2.5" fill="white"/>
  <circle cx="20" cy="32" r="2.5" fill="white"/>
  <circle cx="9.6" cy="26" r="2.5" fill="white"/>
  <circle cx="9.6" cy="14" r="2.5" fill="white"/>
</svg>
