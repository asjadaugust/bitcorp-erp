<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" rx="8" fill="#0077CD"/>
  <!-- Hexagon with all internal connections (fully connected graph) -->
  <!-- Outer hexagon edges -->
  <polygon points="20,8 30.4,14 30.4,26 20,32 9.6,26 9.6,14" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- All diagonal connections -->
  <line x1="20" y1="8" x2="30.4" y2="26" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="8" x2="9.6" y2="26" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="8" x2="20" y2="32" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="30.4" y1="14" x2="9.6" y2="26" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="30.4" y1="14" x2="20" y2="32" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="30.4" y1="14" x2="9.6" y2="14" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="30.4" y1="26" x2="9.6" y2="14" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="30.4" y1="26" x2="20" y2="32" stroke="white" stroke-width="0.8" opacity="0.4" />
  <line x1="9.6" y1="26" x2="20" y2="32" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- 6 node circles at vertices -->
  <circle cx="20" cy="8" r="2" fill="white"/>
  <circle cx="30.4" cy="14" r="2" fill="white"/>
  <circle cx="30.4" cy="26" r="2" fill="white"/>
  <circle cx="20" cy="32" r="2" fill="white"/>
  <circle cx="9.6" cy="26" r="2" fill="white"/>
  <circle cx="9.6" cy="14" r="2" fill="white"/>
</svg>
