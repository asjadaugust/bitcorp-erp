name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/
        working-directory: backend

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bitcorp_test
          POSTGRES_USER: bitcorp
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bitcorp -d bitcorp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run database migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bitcorp:test_password@localhost:5432/bitcorp_test
      - run: python -m pytest tests/ -q
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bitcorp:test_password@localhost:5432/bitcorp_test
          REDIS_URL: redis://localhost:6379
          DB_HOST: localhost
          DB_PORT: "5432"
          POSTGRES_DB: bitcorp_test
          POSTGRES_USER: bitcorp
          POSTGRES_PASSWORD: test_password
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          ENVIRONMENT: testing
          PYTHONPATH: .

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx eslint "src/**/*.ts" "src/**/*.html" || true
        working-directory: frontend
