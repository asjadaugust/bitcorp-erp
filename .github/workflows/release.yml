name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bitcorp_test
          POSTGRES_USER: bitcorp
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bitcorp -d bitcorp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/
        working-directory: backend
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run database migrations
        run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bitcorp:test_password@localhost:5432/bitcorp_test
      - run: python -m pytest tests/ -q
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bitcorp:test_password@localhost:5432/bitcorp_test
          REDIS_URL: redis://localhost:6379
          DB_HOST: localhost
          DB_PORT: "5432"
          POSTGRES_DB: bitcorp_test
          POSTGRES_USER: bitcorp
          POSTGRES_PASSWORD: test_password
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          ENVIRONMENT: testing
          PYTHONPATH: .

  build-apk:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed for gh release upload
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: mobile
      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "${KEYSTORE_BASE64}" | tr -d '[:space:]' | base64 --decode > mobile/android/release-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release-keystore.jks\n' \
            "${KEYSTORE_PASSWORD}" "${KEY_PASSWORD}" "${KEY_ALIAS}" \
            > mobile/android/key.properties
      - run: flutter build apk --release --dart-define=API_URL=https://bitcorp.app/api
        working-directory: mobile
      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            mobile/build/app/outputs/flutter-apk/app-release.apk \
            --clobber

  notify-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Send deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          SHA="${{ github.sha }}"
          PAYLOAD="{\"tag\":\"${TAG}\",\"sha\":\"${SHA}\"}"
          SIGNATURE=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | awk '{print $2}')
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -d "${PAYLOAD}" \
            "https://bitcorp.app/deploy-webhook" \
            --max-time 10 || echo "Webhook delivery failed (server may be offline)"
